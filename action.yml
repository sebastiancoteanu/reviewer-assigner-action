name: "Reviewer Assigner"
description: "Auto-assign PR reviewers using CODEOWNERS, recent editors, and load balancing."

inputs:
  github-token:
    description: "Required. Token for GitHub API calls; set this from your workflow secret GITHUB_TOKEN."
    required: true
  config-path:
    description: "Optional path to reviewer config file in the consumer repo (default: .github/reviewer-assignment.yml)."
    required: false
    default: ".github/reviewer-assignment.yml"

runs:
  using: "node20"
  main: "dist/main.js"

branding:
  icon: "users"
  color: "blue"
